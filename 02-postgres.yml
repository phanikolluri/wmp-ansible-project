- name: Postgres database installation process
  hosts: all
  become: yes
  tasks:
    - name: Disable postgres default module
      ansible.builtin.shell: dnf -qy module disable postgresql

    - name: Install Postgres
      ansible.builtin.dnf:
        state: present
        name:
          - "postgresql16-server"
          - "postgresql16"

    - name: Initialize Database
      ansible.builtin.shell: /usr/pgsql-16/bin/postgresql-16-setup initdb
      ignore_errors: yes

    - name: Modify listen_addresses
      ansible.builtin.lineinfile:
        path: /var/lib/pgsql/16/data/postgresql.conf
        regexp: #listen_addresses = 'localhost'"
        line: "listen_addresses = '*'"

    - name: Copy nginx configuration
      ansible.builtin.copy:
        src: pg_hba.conf
        dest: /var/lib/pgsql/16/data/pg_hba.conf

    - name: Start PostgreSQL service
      ansible.builtin.service:
        name: postgresql-16
        enabled: yes
        state: restarted

    - name: Copy schema file
      ansible.builtin.copy:
        src: setup.sql
        dest: /tmp/script.sql

    - name: Load schema
      ansible.builtin.shell: sudo -u postgres /usr/pgsql-16/bin/psql < /tmp/script.sql

   



































