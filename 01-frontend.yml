- name: Configuration of Frontend Server
  hosts: all
  become: yes
  tasks:
    - name: Download nodejs repo
      ansible.builtin.shell: curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
      
    - name: Install nginx 1.26 and nodejs
      ansible.builtin.dnf:
        name:
          - '@nginx:1.26'
          - nodejs
        state: present

    - name: Copy nginx configuration
      ansible.builtin.copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf

    - name: Unarchive a file that needs to be downloaded (added in 2.0)
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb88/wealth-project/main/artifacts/frontend.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Create a frontend  directory
      ansible.builtin.file:
        path: /tmp/frontend
        state: directory
        
    - name: delete content in nginx html folder
      ansible.builtin.file:
        path: /usr/share/nginx/html
        state: absent

    - name: Install dependencies and build
      ansible.builtin.shell: npm ci; npm run build
      args:
        chdir: /tmp/frontend

    - name: Remove the default Nginx content and copy the built frontend
      ansible.builtin.shell: cp -r /tmp/frontend/dist/* /usr/share/nginx/html/

    - name: Start service nginx
      ansible.builtin.service:
        name: nginx
        enabled: yes
        state: restarted



        

    